<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  // Background
  ctx.fillStyle = '#0D2818';
  ctx.fillRect(0, 0, s, s);
  // Gold circle border
  ctx.strokeStyle = '#D4AF37';
  ctx.lineWidth = s * 0.02;
  ctx.beginPath();
  ctx.arc(s/2, s/2, s*0.38, 0, Math.PI*2);
  ctx.stroke();
  // Arabic text
  ctx.fillStyle = '#D4AF37';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `bold ${s*0.22}px serif`;
  ctx.fillText('زيارة', s/2, s*0.54);
}
drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));

// Download links
[192, 512].forEach(size => {
  const canvas = document.getElementById('c' + size);
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = `icon-${size}.png`;
  a.textContent = `Download ${size}x${size}`;
  document.body.appendChild(a);
  document.body.appendChild(document.createElement('br'));
});
</script>
</body>
</html>
