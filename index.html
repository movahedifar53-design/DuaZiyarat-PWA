<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D2818">
<title>دعاء و زيارت</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Traditional Arabic', 'Scheherazade', 'Amiri', serif;
  background: #0D2818;
  color: #FFFFFF;
  min-height: 100vh;
  -webkit-user-select: none; user-select: none;
}

/* ===== MENU PAGE ===== */
#menuPage {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px 100px;
  min-height: 100vh;
}
.menu-title {
  color: #D4AF37;
  font-size: 2.2em;
  margin-bottom: 8px;
  text-align: center;
}
.menu-subtitle {
  color: #a0b8a0;
  font-size: 1em;
  margin-bottom: 30px;
  text-align: center;
}
.menu-grid {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 100%;
  max-width: 400px;
}
.menu-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(212,175,55,0.2);
  border-radius: 14px;
  padding: 22px 20px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.menu-card:hover, .menu-card:active {
  background: rgba(212,175,55,0.12);
  border-color: #D4AF37;
  transform: scale(1.02);
}
.menu-card-title {
  color: #D4AF37;
  font-size: 1.6em;
  margin-bottom: 4px;
}
.menu-card-desc {
  color: #a0b8a0;
  font-size: 0.85em;
}

/* ===== READER PAGE ===== */
#readerPage {
  display: none;
  flex-direction: column;
  min-height: 100vh;
}
.reader-header {
  background: rgba(13,40,24,0.95);
  border-bottom: 1px solid rgba(212,175,55,0.3);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
  backdrop-filter: blur(10px);
}
.back-btn {
  background: none;
  border: 1px solid rgba(212,175,55,0.4);
  color: #D4AF37;
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 1em;
  cursor: pointer;
  font-family: inherit;
}
.back-btn:active { background: rgba(212,175,55,0.15); }
.reader-title {
  color: #D4AF37;
  font-size: 1.3em;
  flex: 1;
  text-align: center;
  margin: 0 10px;
}
.font-controls {
  display: flex;
  gap: 6px;
}
.font-btn {
  background: none;
  border: 1px solid rgba(212,175,55,0.4);
  color: #D4AF37;
  width: 32px;
  height: 32px;
  border-radius: 8px;
  font-size: 1.1em;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.font-btn:active { background: rgba(212,175,55,0.15); }

.reader-body {
  padding: 20px 18px 120px;
  flex: 1;
  overflow-y: auto;
}
.dua-text {
  font-size: 1.5em;
  line-height: 2.2;
  text-align: justify;
  color: #f0f0f0;
}
.dua-text .section-title {
  color: #D4AF37;
  font-size: 1.1em;
  text-align: center;
  display: block;
  margin: 20px 0 10px;
  font-weight: bold;
}
.dua-text .repeat-note {
  color: #a0b8a0;
  font-size: 0.7em;
  text-align: center;
  display: block;
  margin: 10px 0;
  font-style: italic;
}
.dua-text .instruction {
  color: #D4AF37;
  font-size: 0.75em;
  text-align: center;
  display: block;
  margin: 12px 0;
  opacity: 0.8;
}
.dua-text .farsi {
  display: none;
  color: #8cc8a0;
  font-size: 0.75em;
  line-height: 1.8;
  margin: 4px 0 16px;
  padding: 8px 12px;
  border-right: 2px solid rgba(212,175,55,0.3);
  font-family: 'Vazirmatn', 'B Nazanin', 'Tahoma', sans-serif;
}
.show-farsi .farsi {
  display: block;
}
.translate-btn {
  background: none;
  border: 1px solid rgba(212,175,55,0.4);
  color: #D4AF37;
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 0.75em;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
}
.translate-btn:active { background: rgba(212,175,55,0.15); }
.translate-btn.active {
  background: rgba(212,175,55,0.2);
  border-color: #D4AF37;
}

/* ===== AUDIO PLAYER ===== */
.audio-player {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(13,40,24,0.97);
  border-top: 1px solid rgba(212,175,55,0.3);
  padding: 10px 16px;
  z-index: 20;
  backdrop-filter: blur(10px);
}
.audio-player.visible { display: block; }
.audio-controls {
  display: flex;
  align-items: center;
  gap: 12px;
}
.play-btn {
  background: none;
  border: 2px solid #D4AF37;
  color: #D4AF37;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  font-size: 1.2em;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.play-btn:active { background: rgba(212,175,55,0.2); }
.speed-btn {
  background: none;
  border: 1px solid rgba(212,175,55,0.4);
  color: #D4AF37;
  min-width: 42px;
  height: 30px;
  padding: 0 8px;
  border-radius: 8px;
  font-size: 0.8em;
  cursor: pointer;
  font-family: inherit;
  flex-shrink: 0;
}
.speed-btn:active { background: rgba(212,175,55,0.2); }
.audio-progress-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
}
.audio-progress-bar {
  flex: 1;
  height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
}
.audio-progress-fill {
  height: 100%;
  background: #D4AF37;
  border-radius: 2px;
  width: 0%;
  transition: width 0.2s;
}
.audio-time {
  color: #a0b8a0;
  font-size: 0.7em;
  min-width: 38px;
  text-align: center;
  font-family: monospace;
  direction: ltr;
}

/* Scroll progress */
.progress-bar {
  position: fixed;
  top: 0;
  left: 0;
  height: 3px;
  background: #D4AF37;
  z-index: 20;
  transition: width 0.1s;
  width: 0%;
}

/* Install hint */
.install-hint {
  color: #a0b8a0;
  font-size: 0.75em;
  text-align: center;
  margin-top: 20px;
  opacity: 0.7;
}
@media all and (display-mode: standalone) {
  .install-hint { display: none; }
}
</style>
</head>
<body>

<div class="progress-bar" id="progressBar"></div>

<!-- MENU PAGE -->
<div id="menuPage">
  <div class="menu-title">دعاء و زيارت</div>
  <div class="menu-subtitle"></div>

  <div class="menu-grid">
    <div class="menu-card" onclick="openDua('ashura')">
      <div class="menu-card-title">زيارة عاشوراء</div>
      <div class="menu-card-desc"></div>
    </div>
    <div class="menu-card" onclick="openDua('ameenallah')">
      <div class="menu-card-title">زيارة أمين الله</div>
      <div class="menu-card-desc"></div>
    </div>
    <div class="menu-card" onclick="openDua('ahd')">
      <div class="menu-card-title">دعاء العهد</div>
      <div class="menu-card-desc"></div>
    </div>
    <div class="menu-card" onclick="openDua('kisa')">
      <div class="menu-card-title">حديث الكساء</div>
      <div class="menu-card-desc"></div>
    </div>
    <div class="menu-card" onclick="openDua('isteghasa')">
      <div class="menu-card-title">استغاثه</div>
      <div class="menu-card-desc"></div>
    </div>
    <div class="menu-card" onclick="openDua('aleyasin')">
      <div class="menu-card-title">دعاء آل يس</div>
      <div class="menu-card-desc"></div>
    </div>
  </div>

  <div class="install-hint">برای تجربه بهتر به صفحه اصلی اضافه کنید</div>
</div>

<!-- READER PAGE -->
<div id="readerPage">
  <div class="reader-header">
    <button class="back-btn" onclick="goBack()">&#x2190;</button>
    <div class="reader-title" id="readerTitle"></div>
    <div class="font-controls">
      <button class="translate-btn" id="translateBtn" onclick="toggleTranslation()">فارسی</button>
      <button class="font-btn" onclick="changeFontSize(-2)">A-</button>
      <button class="font-btn" onclick="changeFontSize(2)">A+</button>
    </div>
  </div>
  <div class="reader-body" id="readerBody">
    <div class="dua-text" id="duaText"></div>
  </div>
  <div class="audio-player" id="audioPlayer">
    <div class="audio-controls">
      <button class="play-btn" id="playBtn" onclick="toggleAudio()">&#9654;</button>
      <div class="audio-progress-wrap">
        <span class="audio-time" id="audioCurrentTime">0:00</span>
        <div class="audio-progress-bar" id="audioProgressBar" onclick="seekAudio(event)">
          <div class="audio-progress-fill" id="audioProgressFill"></div>
        </div>
        <span class="audio-time" id="audioDuration">0:00</span>
      </div>
      <button class="speed-btn" id="speedBtn" onclick="cycleSpeed()">1x</button>
    </div>
  </div>
</div>

<script>
// ===== DUA TEXTS =====
const duas = {
  ashura: {
    title: 'زيارة عاشوراء',
    text: `اَلسَّلاَمُ عَلَيْكَ يَا أَبَا عَبْدِ ٱللَّهِ اَلسَّلاَمُ عَلَيْكَ يَا بْنَ رَسُولِ ٱللَّهِ السَّلاَمُ عَلَيكَ يَا خِيَرَةِ ٱللَّهِ وَٱبْنَ خَيرَتِهِ اَلسَّلاَمُ عَلَيْكَ يَا بْنَ أَمِيرِ ٱلْمُؤْمِنِينَ وَٱبْنَ سَيِّدِ ٱلْوَصِيِّينَ اَلسَّلاَمُ عَلَيْكَ يَا بْنَ فَاطِمَةَ سَيِّدَةِ نِسَاءِ ٱلْعَالَمِينَ اَلسَّلاَمُ عَلَيْكَ يَا ثَارَ ٱللَّهِ وَٱبْنَ ثَارِهِ وَٱلْوِتْرَ ٱلْمَوْتُورَ اَلسَّلاَمُ عَلَيْكَ وَعَلَىٰ ٱلأَرْوَاحِ ٱلَّتِي حَلَّتْ بِفِنَائِكَ عَلَيْكُمْ مِنِّي جَمِيعاً سَلاَمُ ٱللَّهِ أَبَداً مَا بَقيتُ وَبَقِيَ ٱللَّيْلُ وَٱلنَّهَارُ

يَا أَبَا عَبْدِ ٱللَّهِ لَقَدْ عَظُمَتِ ٱلرَّزِيَّةُ وَجَلَّتْ وَعَظُمَتِ ٱلْمُصيبَةُ بِكَ عَلَيْنَا وَعَلَىٰ جَمِيعِ أَهْلِ ٱلإِسْلاَمِ وَجَلَّتْ وَعَظُمَتْ مُصيبَتُكَ فِي ٱلسَّمَاوَاتِ عَلَىٰ جَمِيعِ أَهْلِ ٱلسَّمَاوَاتِ فَلَعَنَ ٱللَّهُ أُمَّةً أَسَّسَتْ أَسَاسَ ٱلظُّلْمِ وَٱلْجَوْرِ عَلَيْكُمْ أَهْلَ ٱلْبَيْتِ وَلَعَنَ ٱللَّهُ أُمَّةً دَفَعَتْكُمْ عَنْ مَقَامِكُمْ وَأَزَالَتْكُمْ عَنْ مَرَاتِبِكُمُ ٱلَّتِي رَتَّبَكُمُ ٱللَّهُ فِيهَا وَلَعَنَ ٱللَّهُ أُمَّةً قَتَلَتْكُمْ وَلَعَنَ ٱللَّهُ ٱلْمُمَهِّدِينَ لَهُمْ بِٱلتَّمْكِينِ مِنْ قِتَالِكُمْ بَرِئْتُ إِلَىٰ ٱللَّهِ وَإِلَيْكُمْ مِنْهُمْ وَمِنْ أَشْيَاعِهِمْ وَأَتْبَاعِهِمْ وَأَوْلِيَائِهِمْ

يَا أَبَا عَبْدِ ٱللَّهِ إِنِّي سِلْمٌ لِمَنْ سَالَمَكُمْ وَحَرْبٌ لِمَنْ حَارَبَكُمْ إِلَىٰ يَوْمِ ٱلْقِيَامَةِ وَلَعَنَ ٱللَّهُ آلَ زِيَادٍ وَآلَ مَرْوَانَ وَلَعَنَ ٱللَّهُ بَنِي أُمَيَّةَ قَاطِبَةً وَلَعَنَ ٱللَّهُ ٱبْنَ مَرْجَانَةَ وَلَعَنَ ٱللَّهُ عُمَرَ بْنَ سَعْدٍ وَلَعَنَ ٱللَّهُ شِمْراً وَلَعَنَ ٱللَّهُ أُمَّةً أَسْرَجَتْ وَأَلْجَمَتْ وَتَنَقَّبَتْ لِقِتَالِكَ

بِأَبِي أَنْتَ وَأُمِّي لَقَدْ عَظُمَ مُصَابِي بِكَ فَأَسْأَلُ ٱللَّهَ ٱلَّذِي أَكْرَمَ مَقَامَكَ وَأَكْرَمَنِي بِكَ أَنْ يَرْزُقَنِي طَلَبَ ثَأْرِكَ مَعَ إِمَامٍ مَنْصُورٍ مِنْ أَهْلِ بَيْتِ مُحَمَّدٍ صَلَّىٰ ٱللَّهُ عَلَيْهِ وَآلِهِ

اَللَّهُمَّ ٱجْعَلْنِي عِنْدَكَ وَجِيهاً بِٱلْحُسَيْنِ عَلَيْهِ ٱلسَّلاَمُ فِي ٱلدُّنْيَا وَٱلآخِرَةِ

يَا أَبَا عَبْدِ ٱللَّهِ إِنِّي أَتَقَرَّبُ إِلَىٰ ٱللَّهِ وَإِلَىٰ رَسُولِهِ وَإِلَىٰ أَمِيرِ ٱلْمُؤْمِنِينَ وَإِلَىٰ فَاطِمَةَ وَإِلَىٰ ٱلْحَسَنِ وَإِلَيْكَ بِمُوَالاَتِكَ وَبِٱلْبَرَاءَةِ مِمَّنْ قَاتَلَكَ وَنَصَبَ لَكَ ٱلْحَرْبَ وَبِٱلْبَرَاءَةِ مِمَّنْ أَسَّسَ أَسَاسَ ٱلظُّلْمِ وَٱلْجَوْرِ عَلَيْكُمْ وَأَبْرَأُ إِلَىٰ ٱللَّهِ وَإِلَىٰ رَسُولِهِ مِمَّنْ أَسَّسَ أَسَاسَ ذٰلِكَ وَبَنَىٰ عَلَيْهِ بُنْيَانَهُ وَجَرَىٰ فِي ظُلْمِهِ وَجَوْرِهِ عَلَيْكُمْ وَعلىٰ أَشْيَاعِكُمْ بَرِئْتُ إِلَىٰ ٱللَّهِ وَإِلَيْكُمْ مِنْهُمْ وَأَتَقَرَّبُ إِلَىٰ ٱللَّهِ ثُمَّ إِلَيْكُمْ بِمُوَالاَتِكُمْ وَمُوَالاَةِ وَلِيِّكُمْ وَبِٱلْبَرَاءَةِ مِنْ أَعْدَائِكُمْ وَٱلنَّاصِبِينَ لَكُمُ ٱلْحَرْبَ وَبِٱلْبَرَاءَةِ مِنْ أَشْيَاعِهِمْ وَأَتْبَاعِهِمْ

إِنِّي سِلْمٌ لِمَنْ سَالَمَكُمْ وَحَرْبٌ لِمَنْ حَارَبَكُمْ وَوَلِيٌّ لِمَنْ وَالاَكُمْ وَعَدُوٌّ لِمَنْ عَادَاكُمْ فَأَسْأَلُ ٱللَّهَ ٱلَّذِي أَكْرَمَنِي بِمَعْرِفَتِكُمْ وَمَعْرِفَةِ أَوْلِيَائِكُمْ وَرَزَقَنِيَ ٱلْبَرَاءَةَ مِنْ أَعْدَائِكُمْ أَنْ يَجْعَلَنِي مَعَكُمْ فِي ٱلدُّنْيَا وَٱلآخِرَةِ وَأَنْ يُثَبِّتَ لِي عِنْدَكُمْ قَدَمَ صِدْقٍ فِي ٱلدُّنْيَا وَٱلآخِرَةِ وَأَسْأَلُهُ أَنْ يُبَلِّغَنِيَ ٱلْمَقَامَ ٱلْمَحْمُودَ لَكُمْ عِنْدَ ٱللَّهِ وَأَنْ يَرْزُقَنِي طَلَبَ ثَأْرِي مَعَ إِمَامِ هُدىًٰ ظَاهِرٍ نَاطِقٍ بِٱلْحَقِّ مِنْكُمْ وَأَسْأَلُ ٱللَّهَ بِحَقِّكُمْ وَبِٱلشَّأْنِ ٱلَّذِي لَكُمْ عِنْدَهُ أَنْ يُعْطِيَنِي بِمُصَابِي بِكُمْ أَفْضَلَ مَا يُعْطِي مُصَاباً بِمُصِيبَتِهِ مُصِيبَةً مَا أَعْظَمَهَا وَأَعْظَمَ رَزِيَّتَهَا فِي ٱلإِسْلاَمِ وَفِي جَمِيعِ ٱلسَّمَاوَاتِ وَٱلأَرْضِ

اَللَّهُمَّ ٱجْعَلْنِي فِي مَقَامِي هٰذَا مِمَّنْ تَنَالُهُ مِنْكَ صَلَوَاتٌ وَرَحْمَةٌ وَمَغْفِرَةٌ

اَللَّهُمَّ ٱجْعَلْ مَحْيَايَ مَحْيَا مُحَمَّدٍ وَآلِ مُحَمَّدٍ وَمَمَاتِي مَمَاتَ مُحَمَّدٍ وَآلِ مُحَمَّدٍ

اَللَّهُمَّ إِنَّ هٰذَا يَوْمٌ تَبَرَّكَتْ بِهِ بَنُو أُمَيَّةَ وَٱبْنُ آكِلَةِ ٱلأَكبَادِ ٱللَّعِينُ ٱبْنُ ٱللَّعِينِ عَلَىٰ لِسَانِكَ وَلِسَانِ نَبِيِّكَ صَلَّىٰ ٱللَّهُ عَلَيْهِ وَآلِهِ فِي كُلِّ مَوْطِنٍ وَمَوْقِفٍ وَقَفَ فِيهِ نَبِيُّكَ صَلَّىٰ ٱللَّهُ عَلَيْهِ وَآلِهِ

اَللَّهُمَّ ٱلْعَنْ أَبَا سُفْيَانَ وَمُعَاوِيَةَ وَيَزيدَ بْنَ مُعَاوِيَةَ عَلَيْهِمْ مِنْكَ ٱللَّعْنَةُ أَبَدَ ٱلآبِدِينَ

وَهٰذَا يَوْمٌ فَرِحَتْ بِهِ آلُ زِيَادٍ وَآلُ مَرْوَانَ بِقَتْلِهِمُ ٱلْحُسَيْنَ صَلَوَاتُ ٱللَّهِ عَلَيْهِ

اَللَّهُمَّ فَضَاعِفْ عَلَيْهِمُ ٱللَّعْنَ مِنْكَ وَٱلْعَذَابَ ٱلأَلِيمَ

اَللَّهُمَّ إِنِّي أَتَقَرَّبُ إِلَيْكَ فِي هٰذَا ٱلْيَوْمِ وَفِي مَوْقِفِي هٰذَا وَأَيَّامِ حَيَاتِي بِٱلْبَرَاءَةِ مِنْهُمْ وَٱللَّعْنَةِ عَلَيْهِمْ وَبِٱلْمُوَالاَةِ لِنَبِيِّكَ وَآلِ نَبِيِّكَ عَلَيْهِ وَعَلَيْهِمُ ٱلسَّلاَمُ

<span class="repeat-note">تقول مائة مرة:</span>

اَللَّهُمَّ ٱلْعَنْ أَوَّلَ ظَالِمٍ ظَلَمَ حَقَّ مُحَمَّدٍ وَآلِ مُحَمَّدٍ وَآخِرَ تَابِعٍ لَهُ عَلَىٰ ذٰلِكَ اَللَّهُمَّ ٱلْعَنِ ٱلْعِصَابَةَ ٱلَّتِي جَاهَدَتِ ٱلْحُسَيْنَ وَشَايَعَتْ وَبَايَعَتْ وَتَابَعَتْ عَلَىٰ قَتْلِهِ اَللَّهُمَّ ٱلْعَنْهُمْ جَمِيعاً

<span class="repeat-note">تقول مائة مرة:</span>

اَلسَّلاَمُ عَلَيْكَ يَا أَبَا عَبْدِ ٱللَّهِ وَعَلَىٰ ٱلأَرْوَاحِ ٱلَّتِي حَلَّتْ بِفِنَائِكَ عَلَيْكَ مِنِّي سَلاَمُ ٱللَّهِ أَبَداً مَا بَقيتُ وَبَقِيَ ٱللَّيْلُ وَٱلنَّهَارُ وَلاَ جَعَلَهُ ٱللَّهُ آخِرَ ٱلْعَهْدِ مِنِّي لِزِيَارَتِكُمْ اَلسَّلاَمُ عَلَىٰ ٱلْحُسَيْنِ وَعَلَىٰ عَلِيِّ بْنِ ٱلْحُسَيْنِ وَعَلَىٰ أَوْلاَدِ ٱلْحُسَيْنِ وَعَلَىٰ أَصْحَابِ ٱلْحُسَيْنِ

<span class="section-title">ثم تقول:</span>

اَللَّهُمَّ خُصَّ أَنْتَ أَوَّلَ ظَالِمٍ بِٱللَّعْنِ مِنِّي وَٱبْدَأْ بِهِ أَوَّلًا ثُمَّ ٱلْعَنِ ٱلثَّانِيَ وَٱلثَّالِثَ وَٱلرَّابِعَ اَللَّهُمَّ ٱلْعَنْ يَزِيدَ خَامِساً وَٱلْعَنْ عُبَيْدَ ٱللَّهِ بْنَ زِيَادٍ وَٱبْنَ مَرْجَانَةَ وَعُمَرَ بْنَ سَعْدٍ وَشِمْراً وَآلَ أَبِي سُفْيَانَ وَآلَ زِيَادٍ وَآلَ مَرْوَانَ إِلَىٰ يَوْمِ ٱلْقِيَامَةِ

<span class="section-title">ثم تسجد وتقول:</span>

اَللَّهُمَّ لَكَ ٱلْحَمْدُ حَمْدَ ٱلشَّاكِرِينَ لَكَ عَلَىٰ مُصَابِهِمْ اَلْحَمْدُ لِلَّهِ عَلَىٰ عَظِيمِ رَزِيَّتِي اَللَّهُمَّ ٱرْزُقْنِي شَفَاعَةَ ٱلْحُسَيْنِ يَوْمَ ٱلْوُرُودِ وَثَبِّتْ لِي قَدَمَ صِدْقٍ عِنْدَكَ مَعَ ٱلْحُسَيْنِ وَأَصْحَابِ ٱلْحُسَيْنِ ٱلَّذينَ بَذَلُوٱ مُهَجَهُمْ دُونَ ٱلْحُسَيْنِ عَلَيْهِ ٱلسَّلاَمُ

<span class="section-title">دعاء علقمة</span>

يَا اللَّهُ يَا اللَّهُ يَا اللَّهُ، يَا مُجِيبَ دَعْوَةِ الْمُضْطَرِّينَ، يَا كَاشِفَ كُرَبِ الْمَكْرُوبِينَ، يَا غِيَاثَ الْمُسْتَغِيثِينَ، يَا صَرِيخَ الْمُسْتَصْرِخِينَ، يَا مَنْ هُوَ أَقْرَبُ إِلَيَّ مِنْ حَبْلِ الْوَرِيدِ، يَا مَنْ يَحُولُ بَيْنَ الْمَرْءِ وَ قَلْبِهِ، وَ يَا مَنْ هُوَ بِالْمَنْظَرِ الْأَعْلَى، وَ بِالْأُفُقِ الْمُبِينِ، وَ يَا مَنْ هُوَ الرَّحْمَنُ الرَّحِيمُ عَلَى الْعَرْشِ اسْتَوَى، وَ يَا مَنْ يَعْلَمُ خَائِنَةَ الْأَعْيُنِ وَ مَا تُخْفِي الصُّدُورُ، وَ يَا مَنْ لَا يَخْفَى عَلَيْهِ خَافِيَةٌ، يَا مَنْ لَا تَشْتَبِهُ عَلَيْهِ الْأَصْوَاتُ، وَ يَا مَنْ لَا تُغَلِّطُهُ الْحَاجَاتُ، وَ يَا مَنْ لَا يُبْرِمُهُ إِلْحَاحُ الْمُلِحِّينَ، وَ يَا مُدْرِكَ كُلِّ فَوْتٍ، وَ يَا جَامِعَ كُلِّ شَمْلٍ، وَ يَا بَارِئَ النُّفُوسِ بَعْدَ الْمَوْتِ، يَا مَنْ هُوَ كُلَّ يَوْمٍ فِي شَأْنٍ، يَا قَاضِيَ الْحَاجَاتِ، يَا مُنَفِّسَ الْكُرُبَاتِ، يَا مُعْطِيَ السُّؤْلَاتِ، يَا وَلِيَّ الرَّغَبَاتِ، يَا كَافِيَ الْمُهِمَّاتِ، يَا مَنْ يَكْفِي مِنْ كُلِّ شَيْءٍ وَ لَا يَكْفِي مِنْهُ شَيْءٌ فِي السَّمَاوَاتِ وَ الْأَرْضِ.

أَسْأَلُكَ بِحَقِّ مُحَمَّدٍ خَاتَمِ النَّبِيِّينَ وَ عَلِيٍّ أَمِيرِ الْمُؤْمِنِينَ، وَ بِحَقِّ فَاطِمَةَ بِنْتِ نَبِيِّكَ، وَ بِحَقِّ الْحَسَنِ وَ الْحُسَيْنِ، فَإِنِّي بِهِمْ أَتَوَجَّهُ إِلَيْكَ فِي مَقَامِي هَذَا، وَ بِهِمْ أَتَوَسَّلُ، وَ بِهِمْ أَتَشَفَّعُ إِلَيْكَ، وَ بِحَقِّهِمْ أَسْأَلُكَ وَ أُقْسِمُ وَ أَعْزِمُ عَلَيْكَ، وَ بِالشَّأْنِ الَّذِي لَهُمْ عِنْدَكَ وَ بِالْقَدْرِ الَّذِي لَهُمْ عِنْدَكَ، وَ بِالَّذِي فَضَّلْتَهُمْ عَلَى الْعَالَمِينَ، وَ بِاسْمِكَ الَّذِي جَعَلْتَهُ عِنْدَهُمْ، وَ بِهِ خَصَصْتَهُمْ دُونَ الْعَالَمِينَ، وَ بِهِ أَبَنْتَهُمْ وَ أَبَنْتَ فَضْلَهُمْ مِنْ فَضْلِ الْعَالَمِينَ حَتَّى فَاقَ فَضْلُهُمْ فَضْلَ الْعَالَمِينَ جَمِيعاً.

أَسْأَلُكَ أَنْ تُصَلِّيَ عَلَى مُحَمَّدٍ وَ آلِ مُحَمَّدٍ، وَ أَنْ تَكْشِفَ عَنِّي غَمِّي وَ هَمِّي وَ كَرْبِي، وَ تَكْفِيَنِي الْمُهِمَّ مِنْ أُمُورِي، وَ تَقْضِيَ عَنِّي دَيْنِي، وَ تُجِيرَنِي مِنَ الْفَقْرِ، وَ تُجِيرَنِي مِنَ الْفَاقَةِ، وَ تُغْنِيَنِي عَنِ الْمَسْأَلَةِ إِلَى الْمَخْلُوقِينَ، وَ تَكْفِيَنِي هَمَّ مَنْ أَخَافُ هَمَّهُ، وَ جَوْرَ مَنْ أَخَافُ جَوْرَهُ، وَ عُسْرَ مَنْ أَخَافُ عُسْرَهُ، وَ حُزُونَةَ مَنْ أَخَافُ حُزُونَتَهُ، وَ شَرَّ مَنْ أَخَافُ شَرَّهُ، وَ مَكْرَ مَنْ أَخَافُ مَكْرَهُ، وَ بَغْيَ مَنْ أَخَافُ بَغْيَهُ، وَ سُلْطَانَ مَنْ أَخَافُ سُلْطَانَهُ، وَ كَيْدَ مَنْ أَخَافُ كَيْدَهُ، وَ مَقْدُرَةَ مَنْ أَخَافُ مَقْدُرَتَهُ عَلَيَّ، وَ تَرُدَّ عَنِّي كَيْدَ الْكَيَدَةِ، وَ مَكْرَ الْمَكَرَةِ.

اللَّهُمَّ مَنْ أَرَادَنِي فَأَرِدْهُ، وَ مَنْ كَادَنِي فَكِدْهُ، وَ اصْرِفْ عَنِّي كَيْدَهُ وَ مَكْرَهُ وَ بَأْسَهُ وَ أَمَانِيَّهُ، وَ امْنَعْهُ عَنِّي كَيْفَ شِئْتَ، وَ أَنَّى شِئْتَ.

اللَّهُمَّ اشْغَلْهُ عَنِّي بِفَقْرٍ لَا تَجْبُرُهُ، وَ بِبَلَاءٍ لَا تَسْتُرُهُ، وَ بِفَاقَةٍ لَا تَسُدُّهَا، وَ بِسُقْمٍ لَا تُعَافِيهِ، وَ ذُلٍّ لَا تُعِزُّهُ، وَ بِمَسْكَنَةٍ لَا تَجْبُرُهَا.

اللَّهُمَّ اضْرِبْ بِالذُّلِّ نُصْبَ عَيْنَيْهِ، وَ أَدْخِلْ عَلَيْهِ الْفَقْرَ فِي مَنْزِلِهِ، وَ الْعِلَّةَ وَ السُّقْمَ فِي بَدَنِهِ، حَتَّى تَشْغَلَهُ عَنِّي بِشُغْلٍ شَاغِلٍ لَا فَرَاغَ لَهُ، وَ أَنْسِهِ ذِكْرِي كَمَا أَنْسَيْتَهُ ذِكْرَكَ، وَ خُذْ عَنِّي بِسَمْعِهِ وَ بَصَرِهِ وَ لِسَانِهِ وَ يَدِهِ وَ رِجْلِهِ وَ قَلْبِهِ وَ جَمِيعِ جَوَارِحِهِ، وَ أَدْخِلْ عَلَيْهِ فِي جَمِيعِ ذَلِكَ السُّقْمَ، وَ لَا تَشْفِهِ حَتَّى تَجْعَلَ ذَلِكَ لَهُ شُغْلاً شَاغِلاً بِهِ عَنِّي وَ عَنْ ذِكْرِي، وَ اكْفِنِي يَا كَافِي مَا لَا يَكْفِي سِوَاكَ، فَإِنَّكَ الْكَافِي لَا كَافِيَ سِوَاكَ، وَ مُفَرِّجٌ لَا مُفَرِّجَ سِوَاكَ، وَ مُغِيثٌ لَا مُغِيثَ سِوَاكَ، وَ جَارٌ لَا جَارَ سِوَاكَ، خَابَ مَنْ كَانَ جَارُهُ سِوَاكَ، وَ مُغِيثُهُ سِوَاكَ، وَ مَفْزَعُهُ إِلَى سِوَاكَ، وَ مَهْرَبُهُ إِلَى سِوَاكَ، وَ مَلْجَأُهُ إِلَى غَيْرِكَ، وَ مَنْجَاهُ مِنْ مَخْلُوقٍ غَيْرِكَ، فَأَنْتَ ثِقَتِي وَ رَجَائِي وَ مَفْزَعِي وَ مَهْرَبِي وَ مَلْجَأَيْ وَ مَنْجَايَ، فَبِكَ أَسْتَفْتِحُ، وَ بِكَ أَسْتَنْجِحُ، وَ بِمُحَمَّدٍ وَ آلِ مُحَمَّدٍ أَتَوَجَّهُ إِلَيْكَ وَ أَتَوَسَّلُ وَ أَتَشَفَّعُ.

فَأَسْأَلُكَ يَا اللَّهُ يَا اللَّهُ يَا اللَّهُ، فَلَكَ الْحَمْدُ، وَ لَكَ الشُّكْرُ، وَ إِلَيْكَ الْمُشْتَكَى وَ أَنْتَ الْمُسْتَعَانُ.

فَأَسْأَلُكَ يَا اللَّهُ يَا اللَّهُ يَا اللَّهُ، بِحَقِّ مُحَمَّدٍ وَ آلِ مُحَمَّدٍ أَنْ تُصَلِّيَ عَلَى مُحَمَّدٍ وَ آلِ مُحَمَّدٍ، وَ أَنْ تَكْشِفَ عَنِّي غَمِّي وَ هَمِّي وَ كَرْبِي فِي مَقَامِي هَذَا، كَمَا كَشَفْتَ عَنْ نَبِيِّكَ هَمَّهُ وَ غَمَّهُ وَ كَرْبَهُ، وَ كَفَيْتَهُ هَوْلَ عَدُوِّهِ، فَاكْشِفْ عَنِّي كَمَا كَشَفْتَ عَنْهُ، وَ فَرِّجْ عَنِّي كَمَا فَرَّجْتَ عَنْهُ، وَ اكْفِنِي كَمَا كَفَيْتَهُ، وَ اصْرِفْ عَنِّي هَوْلَ مَا أَخَافُ هَوْلَهُ، وَ مَؤُونَةَ مَا أَخَافُ مَؤُونَتَهُ، وَ هَمَّ مَا أَخَافُ هَمَّهُ بِلَا مَؤُونَةٍ عَلَى نَفْسِي مِنْ ذَلِكَ، وَ اصْرِفْنِي بِقَضَاءِ حَوَائِجِي، وَ كِفَايَةِ مَا أَهَمَّنِي هَمُّهُ مِنْ أَمْرِ آخِرَتِي وَ دُنْيَايَ.

يَا أَمِيرَ الْمُؤْمِنِينَ وَ يَا أَبَا عَبْدِ اللَّهِ، عَلَيْكُمَا مِنِّي سَلَامُ اللَّهِ أَبَداً مَا بَقِيَ اللَّيْلُ وَ النَّهَارُ، وَ لَا جَعَلَهُ اللَّهُ آخِرَ الْعَهْدِ مِنْ زِيَارَتِكُمَا، وَ لَا فَرَّقَ اللَّهُ بَيْنِي وَ بَيْنَكُمَا.

اللَّهُمَّ أَحْيِنِي حَيَاةَ مُحَمَّدٍ صَلَّى اللَّهُ عَلَيْهِ وَ آلِهِ وَ ذُرِّيَّتِهِ، وَ أَمِتْنِي مَمَاتَهُمْ، وَ تَوَفَّنِي عَلَى مِلَّتِهِمْ، وَ احْشُرْنِي فِي زُمْرَتِهِمْ، وَ لَا تُفَرِّقْ بَيْنِي وَ بَيْنَهُمْ طَرْفَةَ عَيْنٍ أَبَداً فِي الدُّنْيَا وَ الْآخِرَةِ.`
  },

  ahd: {
    title: 'دعاء العهد',
    text: `اللّهُمَّ رَبَّ النّورِ العَظيمِ، وَرَبَّ الكُرسِيِّ الرَّفيعِ، وَرَبَّ البَحرِ المَسجورِ وَمُنزِلَ التَّوراةِ وَالإِنجيلِ وَالزَّبورِ، وَرَبَّ الظِّلِّ وَالحَرورِ، وَمُنزِلَ القُرآنِ العَظيمِ، وَرَبَّ المَلائِكَةِ المُقَرَّبينَ، وَالأَنبِياءِ وَالمُرسَلينَ.

اللّهُمَّ إِنّي أَسأَلُكَ بِوَجهِكَ الكَريمِ وَبِنورِ وَجهِكَ المُنيرِ، وَمُلكِكَ القَديمِ، يا حَيُّ يا قَيّومُ أَسأَلُكَ بِاسمِكَ الَّذي أَشرَقَت بِهِ السَّمواتُ وَالأَرَضونَ، وَبِاسمِكَ الَّذي يَصلُحُ بِهِ الأَوَّلونَ وَالآخِرونَ، يا حَيّاً قَبلَ كُلِّ حَيٍّ، وَيا حَيّاً بَعدَ كُلِّ حَيٍّ، وَيا حَيّاً حينَ لا حَيَّ يا مُحيِيَ المَوتى وَمُميتَ الأَحياءِ يا حَيُّ لا إِلهَ إِلّا أَنتَ.

اللّهُمَّ بَلِّغ مَولانَا الإِمامَ الهادِيَ المَهدِيَّ القائِمَ بِأَمرِكَ صَلَواتُ اللهِ عَلَيهِ وَعَلى آبائِهِ الطّاهِرينَ عَن جَميعِ المُؤمِنينَ وَالمُؤمِناتِ في مَشارِقِ الأَرضِ وَمَغارِبِها سَهلِها وَجَبَلِها وَبَرِّها وَبَحرِها وَعَنّي وَعَن والِدَيَّ مِنَ الصَّلَواتِ زِنَةَ عَرشِ اللهِ وَمِدادَ كَلِماتِهِ وَما أَحصاهُ عِلمُهُ وَأَحاطَ بِهِ كِتابُهُ.

اللّهُمَّ إِنّي أُجَدِّدُ لَهُ في صَبيحَةِ يَومي هذا وَما عِشتُ مِن أَيّامي عَهداً وَعَقداً وَبَيعَةً لَهُ في عُنُقي لا أَحولُ عَنها وَلا أَزولُ أَبَداً. اللّهُمَّ اجعَلني مِن أَنصارِهِ وَأَعوانِهِ وَالذّابّينَ عَنهُ وَالمُسارِعينَ إِلَيهِ في قَضاءِ حَوائِجِهِ وَالمُمتَثِلينَ لِأَوامِرِهِ وَالمُحامينَ عَنهُ وَالسّابِقينَ إِلى إِرادَتِهِ وَالمُستَشهَدينَ بَينَ يَدَيهِ. اللّهُمَّ إِن حالَ بَيني وَبَينَهُ المَوتُ الَّذي جَعَلتَهُ عَلى عِبادِكَ حَتماً مَقضِيّاً فَأَخرِجني مِن قَبري مُؤتَزِراً كَفَني شاهِراً سَيفي مُجَرِّداً قَناتي مُلَبِّياً دَعوَةَ الدّاعي في الحاضِرِ وَالبادي.

اللّهُمَّ أَرِني الطَّلعَةَ الرَّشيدَةَ وَالغُرَّةَ الحَميدَةَ وَاكحُل ناظِري بِنَظرَةٍ مِنّي إِلَيهِ وَعَجِّل فَرَجَهُ وَسَهِّل مَخرَجَهُ وَأَوسِع مَنهَجَهُ وَاسلُك بي مَحَجَّتَهُ وَأَنفِذ أَمرَهُ وَاشدُد أَزرَهُ وَاعمُر اللّهُمَّ بِهِ بِلادَكَ وَأَحيِ بِهِ عِبادَكَ فَإِنَّكَ قُلتَ وَقَولُكَ الحَقُّ ظَهَرَ الفَسادُ فِي البَرِّ وَالبَحرِ بِما كَسَبَت أَيدِي النّاسِ، فَأَظهِر اللّهُمَّ لَنا وَلِيَّكَ وَابنَ بِنتِ نَبِيِّكَ المُسَمّى بِاسمِ رَسولِكَ حَتّى لا يَظفَرَ بِشَيءٍ مِنَ الباطِلِ إِلّا مَزَّقَهُ وَيُحِقَّ الحَقَّ وَيُحَقِّقَهُ وَاجعَلهُ اللّهُمَّ مَفزَعاً لِمَظلومِ عِبادِكَ وَناصِراً لِمَن لا يَجِدُ لَهُ ناصِراً غَيرَكَ وَمُجَدِّداً لِما عُطِّلَ مِن أَحكامِ كِتابِكَ وَمُشَيِّداً لِما وَرَدَ مِن أَعلامِ دينِكَ وَسُنَنِ نَبِيِّكَ مُحَمَّدٍ صَلَّى اللهُ عَلَيهِ وَآلِهِ وَسَلَّمَ، وَاجعَلهُ اللّهُمَّ مِمَّن حَصَّنتَهُ مِن بَأسِ المُعتَدينَ.

اللّهُمَّ وَسُرَّ نَبِيَّكَ مُحَمَّداً صَلَّى اللهُ عَلَيهِ وَآلِهِ وَسَلَّمَ بِرُؤيَتِهِ وَمَن تَبِعَهُ عَلى دَعوَتِهِ وَارحَم استِكانَتَنا بَعدَهُ. اللّهُمَّ اكشِف هذِهِ الغُمَّةَ عَن هذِهِ الأُمَّةِ بِحُضورِهِ وَعَجِّل لَنا ظُهورَهُ إِنَّهُم يَرَونَهُ بَعيداً وَنَراهُ قَريباً بِرَحمَتِكَ يا أَرحَمَ الرّاحِمينَ.

<span class="instruction">ثُمَّ تَضرِبُ عَلى فَخِذِكَ الأَيمَنِ بِيَدِكَ ثَلاثاً وَتَقولُ:</span>

العَجَلَ العَجَلَ يا مَولايَ يا صاحِبَ الزَّمانِ.`
  },

  kisa: {
    title: 'حديث الكساء',
    text: `اَللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَ آلِ مُحَمَّدٍ

بِسْمِ ٱللَّـهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ

رُوِيَ عَنْ فاطِمَةَ الزَّهْراءِ عَلَيْهَا اَلسلام بِنْتِ رَسُولِ اللّهِ صَلَّى اللهُ عَلَيْهِ وَآلِهِ أَنَّها قالَتْ: دَخَلَ عَلَيَّ أَبِي رَسُولُ اللّهِ صَلَّى اللهُ عَلَيْهِ وَآلِهِ فِي بَعْضِ الأَيَّامِ فَقالَ: السَّلامُ عَلَيْكِ يَا فاطِمَةُ فَقُلْتُ: عَلَيْكَ السَّلامُ قالَ: إِنِّي أَجِدُ فِي بَدَنِي ضُعْفاً فَقُلْتُ لَهُ: أُعِيذُكَ بِاللّهِ يَا أَبَتاهُ مِنَ الضُّعْفِ فَقَالَ: يَا فَاطِمَةُ ائْتِينِي بِالْكِسَاءِ الْيَمَانِيِّ فَغَطِّينِي بِهِ. فَأَتَيْتُهُ بِالْكِسَاءِ الْيَمَانِي فَغَطَّيْتُهُ بِهِ وَصِرْتُ أَنْظُرُ إِلَيْهِ وَإِذَا وَجْهُهُ يَتَلَأْلَؤُ كَأَنَّهُ الْبَدْرُ فِي لَيْلَةِ تَمَامِهِ وَكَمَالِهِ فَمَا كَانَتْ إِلَّا سَاعَةً وَإِذَا بِوَلَدِيَ الْحَسَنِ عَلَيْهِ السَّلامُ قَدْ أَقْبَلَ وَقَالَ: السَّلامُ عَلَيْكِ يَا أُمَّاهُ فَقُلْتُ: وَعَلَيْكَ السَّلامُ يَا قُرَّةَ عَيْنِي وَثَمَرَةَ فُؤادِي فَقَالَ: يَا أُمَّاهُ إِنِّي أَشَمُّ عِنْدَكِ رائِحَةً طَيِّبَةً كَأَنَّهَا رائِحَةُ جَدِّي رَسُولِ اللّهِ صَلَّى اللهُ عَلَيْهِ وَآلِهِ فَقُلْتُ: نَعَمْ إِنَّ جَدَّكَ تَحْتَ الْكِسَاءِ فَأَقْبَلَ الْحَسَنُ نَحْوَ الْكِسَاءِ وَقَالَ: السَّلامُ عَلَيْكَ يَا جَدَّاهُ يَا رَسُولَ اللّهِ أَتَأْذَنُ لِي أَنْ أَدْخُلَ مَعَكَ تَحْتَ الْكِسَاءِ فَقَالَ: وَعَلَيْكَ السَّلامُ يَا وَلَدِي وَيَا صَاحِبَ حَوْضِي قَدْ أَذِنْتُ لَكَ فَدَخَلَ مَعَهُ تَحْتَ الْكِسَاءِ.

فَمَا كَانَتْ إِلَّا سَاعَةً وَإِذَا بِوَلَدِيَ الْحُسَيْنِ قَدْ أَقْبَلَ وَقَالَ: السَّلامُ عَلَيْكِ يَا أُمَّاهُ. فَقُلْتُ: وَعَلَيْكَ السَّلامُ يَا وَلَدِي وَيَا قُرَّةَ عَيْنِي وَثَمَرَةَ فُؤادِي. فَقَالَ لِي: يَا أُمَّاهُ إِنِّي أَشَمُّ عِنْدَكِ رائِحَةً طَيِّبَةً كَأَنَّهَا رائِحَةُ جَدِّي رَسُولِ اللّهِ صَلَّى اللهُ عَلَيْهِ وَآلِهِ. فَقُلْتُ: نَعَمْ إِنَّ جَدَّكَ وَأَخَاكَ تَحْتَ الْكِسَاءِ. فَدَنَا الْحُسَيْنُ نَحْوَ الْكِسَاءِ وَقَالَ: السَّلامُ عَلَيْكَ يَا جَدَّاهُ السَّلامُ عَلَيْكَ يَا مَنِ اخْتَارَهُ اللّهُ أَتَأْذَنُ لِي أَنْ أَكُونَ مَعَكُمَا تَحْتَ الْكِسَاءِ فَقَالَ: وَعَلَيْكَ السَّلامُ يَا وَلَدِي وَيَا شَافِعَ أُمَّتِي قَدْ أَذِنْتُ لَكَ. فَدَخَلَ مَعَهُمَا تَحْتَ الْكِسَاءِ.

فَأَقْبَلَ عِنْدَ ذَلِكَ أَبُو الْحَسَنِ عَلِيُّ بْنُ أَبِي طَالِبٍ وَقَالَ: السَّلامُ عَلَيْكِ يَا بِنْتَ رَسُولِ اللّهِ. فَقُلْتُ: وَعَلَيْكَ السَّلامُ يَا أَبَا الْحَسَنِ وَيَا أَمِيرَ الْمُؤْمِنِينَ. فَقَالَ: يَا فَاطِمَةُ إِنِّي أَشَمُّ عِنْدَكِ رائِحَةً طَيِّبَةً كَأَنَّهَا رائِحَةُ أَخِي وَابْنِ عَمِّي رَسُولِ اللّهِ صَلَّى اللهُ عَلَيْهِ وَآلِهِ. فَقُلْتُ: نَعَمْ هَا هُوَ مَعَ وَلَدَيْكَ تَحْتَ الْكِسَاءِ فَأَقْبَلَ عَلِيٌّ نَحْوَ الْكِسَاءِ وَقَالَ: السَّلامُ عَلَيْكَ يَا رَسُولَ اللّهِ أَتَأْذَنُ لِي أَنْ أَكُونَ مَعَكُمْ تَحْتَ الْكِسَاءِ قَالَ لَهُ: وَعَلَيْكَ السَّلامُ يَا أَخِي وَيَا وَصِيِّي وَخَلِيفَتِي وَصَاحِبَ لِوَائِي قَدْ أَذِنْتُ لَكَ فَدَخَلَ عَلِيٌّ تَحْتَ الْكِسَاءِ.

ثُمَّ أَتَيْتُ نَحْوَ الْكِسَاءِ وَقُلْتُ: السَّلامُ عَلَيْكَ يَا أَبَتَاهُ يَا رَسُولَ اللّهِ أَتَأْذَنُ لِي أَنْ أَكُونَ مَعَكُمْ تَحْتَ الْكِسَاءِ قَالَ: وَعَلَيْكِ السَّلامُ يَا بِنْتِي وَيَا بِضْعَتِي قَدْ أَذِنْتُ لَكِ فَدَخَلْتُ تَحْتَ الْكِسَاءِ.

فَلَمَّا اكْتَمَلْنَا جَمِيعاً تَحْتَ الْكِسَاءِ أَخَذَ أَبِي رَسُولُ اللّهِ بِطَرَفَيِ الْكِسَاءِ وَأَوْمَأَ بِيَدِهِ الْيُمْنَى إِلَى السَّمَاءِ وَقَالَ: اللّهُمَّ إِنَّ هَؤُلاءِ أَهْلُ بَيْتِي وَخَاصَّتِي وَحَامَّتِي لَحْمُهُمْ لَحْمِي وَدَمُهُمْ دَمِي يُؤْلِمُنِي مَا يُؤْلِمُهُمْ وَيَحْزُنُنِي مَا يَحْزُنُهُمْ أَنَا حَرْبٌ لِمَنْ حَارَبَهُمْ وَسِلْمٌ لِمَنْ سَالَمَهُمْ وَعَدُوٌّ لِمَنْ عَادَاهُمْ وَمُحِبٌّ لِمَنْ أَحَبَّهُمْ إِنَّهُمْ مِنِّي وَأَنَا مِنْهُمْ فَاجْعَلْ صَلَوَاتِكَ وَبَرَكَاتِكَ وَرَحْمَتَكَ وَغُفْرَانَكَ وَرِضْوَانَكَ عَلَيَّ وَعَلَيْهِمْ وَأَذْهِبْ عَنْهُمُ الرِّجْسَ وَطَهِّرْهُمْ تَطْهِيراً.

فَقَالَ اللّهُ عَزَّ وَجَلَّ: يَا مَلائِكَتِي وَيَا سُكَّانَ سَمَاوَاتِي إِنِّي مَا خَلَقْتُ سَمَاءً مَبْنِيَّةً وَلا أَرْضاً مَدْحِيَّةً وَلا قَمَراً مُنِيراً وَلا شَمْساً مُضِيئَةً وَلا فَلَكاً يَدُورُ وَلا بَحْراً يَجْرِي وَلا فُلْكاً يَسْرِي إِلَّا فِي مَحَبَّةِ هَؤُلاءِ الْخَمْسَةِ الَّذِينَ هُمْ تَحْتَ الْكِسَاءِ.

فَقَالَ الأمِينُ جَبْرائِيلُ: يَا رَبِّ وَمَنْ تَحْتَ الْكِسَاءِ فَقَالَ عَزَّ وَجَلَّ: هُمْ أَهْلُ بَيْتِ النُّبُوَّةِ وَمَعْدِنُ الرِّسَالَةِ هُمْ فَاطِمَةُ وَأَبُوهَا وَبَعْلُهَا وَبَنُوهَا.

فَقَالَ جَبْرائِيلُ: يَا رَبِّ أَتَأْذَنُ لِي أَنْ أَهْبِطَ إِلَى الأَرْضِ لأكُونَ مَعَهُمْ سَادِساً فَقَالَ اللّهُ: نَعَمْ قَدْ أَذِنْتُ لَكَ.

فَهَبَطَ الأمِينُ جَبْرائِيلُ وَقَالَ: السَّلامُ عَلَيْكَ يَا رَسُولَ اللّهِ الْعَلِيُّ الأعْلَى يُقْرِئُكَ السَّلامَ وَيَخُصُّكَ بِالتَّحِيَّةِ وَالإكْرَامِ وَيَقُولُ لَكَ: وَعِزَّتِي وَجَلالِي إِنِّي مَا خَلَقْتُ سَمَاءً مَبْنِيَّةً وَلا أَرْضاً مَدْحِيَّةً وَلا قَمَراً مُنِيراً وَلا شَمْساً مُضِيئَةً وَلا فَلَكاً يَدُورُ وَلا بَحْراً يَجْرِي وَلا فُلْكاً يَسْرِي إِلَّا لأجْلِكُمْ وَمَحَبَّتِكُمْ وَقَدْ أَذِنَ لِي أَنْ أَدْخُلَ مَعَكُمْ فَهَلْ تَأْذَنُ لِي يَا رَسُولَ اللّهِ فَقَالَ رَسُولُ اللّهِ: وَعَلَيْكَ السَّلامُ يَا أَمِينَ وَحْيِ اللّهِ إِنَّهُ نَعَمْ قَدْ أَذِنْتُ لَكَ.

فَدَخَلَ جَبْرائِيلُ مَعَنَا تَحْتَ الْكِسَاءِ فَقَالَ لأبِي: إِنَّ اللّهَ قَدْ أَوْحَى إِلَيْكُمْ يَقُولُ: إِنَّمَا يُرِيدُ اللّهُ لِيُذْهِبَ عَنْكُمُ الرِّجْسَ أَهْلَ الْبَيْتِ وَيُطَهِّرَكُمْ تَطْهِيراً.

فَقَالَ عَلِيٌّ لأبِي: يَا رَسُولَ اللّهِ أَخْبِرْنِي مَا لِجُلُوسِنَا هَذَا تَحْتَ الْكِسَاءِ مِنَ الْفَضْلِ عِنْدَ اللّهِ فَقَالَ النَّبِيُّ صَلَّى اللهُ عَلَيْهِ وَآلِهِ: وَالَّذِي بَعَثَنِي بِالْحَقِّ نَبِيّاً وَاصْطَفَانِي بِالرِّسَالَةِ نَجِيّاً مَا ذُكِرَ خَبَرُنَا هَذَا فِي مَحْفِلٍ مِنْ مَحَافِلِ أَهْلِ الأرْضِ وَفِيهِ جَمْعٌ مِنْ شِيعَتِنَا وَمُحِبِّينَا إِلَّا وَنَزَلَتْ عَلَيْهِمُ الرَّحْمَةُ وَحَفَّتْ بِهِمُ الْمَلائِكَةُ وَاسْتَغْفَرَتْ لَهُمْ إِلَى أَنْ يَتَفَرَّقُوا.

فَقَالَ عَلِيٌّ عَلَيْهِ السَّلامُ: إِذَنْ وَاللّهِ فُزْنَا وَفَازَ شِيعَتُنَا وَرَبِّ الْكَعْبَةِ.

فَقَالَ أَبِي رَسُولُ اللّهِ صَلَّى اللهُ عَلَيْهِ وَآلِهِ: يَا عَلِيُّ وَالَّذِي بَعَثَنِي بِالْحَقِّ نَبِيّاً وَاصْطَفَانِي بِالرِّسَالَةِ نَجِيّاً مَا ذُكِرَ خَبَرُنَا هَذَا فِي مَحْفِلٍ مِنْ مَحَافِلِ أَهْلِ الأرْضِ وَفِيهِ جَمْعٌ مِنْ شِيعَتِنَا وَمُحِبِّينَا وَفِيهِمْ مَهْمُومٌ إِلَّا وَفَرَّجَ اللّهُ هَمَّهُ وَلا مَغْمُومٌ إِلَّا وَكَشَفَ اللّهُ غَمَّهُ وَلا طَالِبُ حَاجَةٍ إِلَّا وَقَضَى اللّهُ حَاجَتَهُ.

فَقَالَ عَلِيٌّ عَلَيْهِ السَّلامُ: إِذَنْ وَاللّهِ فُزْنَا وَسُعِدْنَا وَكَذَلِكَ شِيعَتُنَا فَازُوا وَسُعِدُوا فِي الدُّنْيَا وَالآخِرَةِ وَرَبِّ الْكَعْبَةِ.

اَللَّهُمَّ صَلِّ عَلَىٰ مُحَمَّدٍ وَآلِ مُحَمَّدٍ.`
  },

  isteghasa: {
    title: 'استغاثه',
    text: `سَلاَمُ اللَّهِ الْكَامِلُ التَّامُّ الشَّامِلُ الْعَامُّ وَصَلَوَاتُهُ الدَّائِمَةُ وَبَرَكَاتُهُ الْقَائِمَةُ التَّامَّةُ عَلَى حُجَّةِ اللَّهِ وَوَلِيِّهِ فِي أَرْضِهِ وَبِلَادِهِ وَخَلِيفَتِهِ عَلَى خَلْقِهِ وَعِبَادِهِ وَسُلَالَةِ النُّبُوَّةِ وَبَقِيَّةِ الْعِتْرَةِ وَالصَّفْوَةِ صَاحِبِ الزَّمَانِ وَمُظْهِرِ الإِيمَانِ وَمُلَقِّنِ أَحْكَامِ الْقُرْآنِ وَمُطَهِّرِ الأَرْضِ وَنَاشِرِ الْعَدْلِ فِي الطُّولِ وَالْعَرْضِ وَالْحُجَّةِ الْقَائِمِ الْمَهْدِيِّ الإِمَامِ الْمُنْتَظَرِ الْمَرْضِيِّ وَابْنِ الأَئِمَّةِ الطَّاهِرِينَ الْوَصِيِّ ابْنِ الأَوْصِيَاءِ الْمَرْضِيِّينَ الْهَادِي الْمَعْصُومِ ابْنِ الأَئِمَّةِ الْهُدَاةِ الْمَعْصُومِينَ.

السَّلَامُ عَلَيْكَ يَا مُعِزَّ الْمُؤْمِنِينَ الْمُسْتَضْعَفِينَ.

السَّلَامُ عَلَيْكَ يَا مُذِلَّ الْكَافِرِينَ الْمُتَكَبِّرِينَ الظَّالِمِينَ.

السَّلَامُ عَلَيْكَ يَا مَوْلَايَ يَا صَاحِبَ الزَّمَانِ.

السَّلَامُ عَلَيْكَ يَا ابْنَ رَسُولِ اللَّهِ.

السَّلَامُ عَلَيْكَ يَا ابْنَ أَمِيرِ الْمُؤْمِنِينَ.

السَّلَامُ عَلَيْكَ يَا ابْنَ فَاطِمَةَ الزَّهْرَاءِ سَيِّدَةِ نِسَاءِ الْعَالَمِينَ.

السَّلَامُ عَلَيْكَ يَا ابْنَ الأَئِمَّةِ الْحُجَجِ الْمَعْصُومِينَ وَالإِمَامُ عَلَى الْخَلْقِ أَجْمَعِينَ.

السَّلَامُ عَلَيْكَ يَا مَوْلَايَ سَلَامَ مُخْلِصٍ لَكَ فِي الْوِلَايَةِ.

أَشْهَدُ أَنَّكَ الإِمَامُ الْمَهْدِيُّ قَوْلاً وَفِعْلاً وَأَنْتَ الَّذِي تَمْلأُ الأَرْضَ قِسْطاً وَعَدْلاً بَعْدَ مَا مُلِئَتْ ظُلْماً وَجَوْراً فَعَجَّلَ اللَّهُ فَرَجَكَ وَسَهَّلَ مَخْرَجَكَ وَقَرَّبَ زَمَانَكَ وَكَثَّرَ أَنْصَارَكَ وَأَعْوَانَكَ وَأَنْجَزَ لَكَ مَا وَعَدَكَ فَهُوَ أَصْدَقُ الْقَائِلِينَ.

وَنُرِيدُ أَنْ نَمُنَّ عَلَى الَّذِينَ اسْتُضْعِفُوا فِي الأَرْضِ وَنَجْعَلَهُمْ أَئِمَّةً وَنَجْعَلَهُمُ الْوَارِثِينَ.

يَا مَوْلَايَ يَا صَاحِبَ الزَّمَانِ يَا ابْنَ رَسُولِ اللَّهِ.

<span class="instruction">حَاجَتِي كَذَا وَكَذَا — اذکر حاجتک</span>

فَاشْفَعْ لِي فِي نَجَاحِهَا فَقَدْ تَوَجَّهْتُ إِلَيْكَ بِحَاجَتِي لِعِلْمِي أَنَّ لَكَ عِنْدَ اللَّهِ شَفَاعَةً مَقْبُولَةً وَمَقَاماً مَحْمُوداً فَبِحَقِّ مَنِ اخْتَصَّكُمْ بِأَمْرِهِ وَارْتَضَاكُمْ لِسِرِّهِ وَبِالشَّأْنِ الَّذِي لَكُمْ عِنْدَ اللَّهِ بَيْنَكُمْ وَبَيْنَهُ سَلِ اللَّهَ تَعَالَى فِي نُجْحِ طَلِبَتِي وَإِجَابَةِ دَعْوَتِي وَكَشْفِ كُرْبَتِي.`

  aleyasin: {
    title: 'دعاء آل يس',
    text: `سَلاَمٌ عَلَىٰ آلِ يـٰس

اَلسَّلاَمُ عَلَيْكَ يَا دَاعِيَ ٱللَّهِ وَرَبَّانِيَّ آيَاتِهِ اَلسَّلاَمُ عَلَيْكَ يَا بَابَ ٱللَّهِ وَدَيَّانَ دِينِهِ اَلسَّلاَمُ عَلَيْكَ يَا خَلِيفَةَ ٱللَّهِ وَنَاصِرَ حَقِّهِ اَلسَّلاَمُ عَلَيْكَ يَا حُجَّةَ ٱللَّهِ وَدَلِيلَ إِرَادَتِهِ اَلسَّلاَمُ عَلَيْكَ يَا تَالِيَ كِتَابِ ٱللَّهِ وَتَرْجُمَانَهُ اَلسَّلاَمُ عَلَيْكَ فِي آنَاءِ لَيْلِكَ وَأَطْرَافِ نَهَارِكَ اَلسَّلاَمُ عَلَيْكَ يَا بَقِيَّةَ ٱللَّهِ فِي أَرْضِهِ اَلسَّلاَمُ عَلَيْكَ يَا مِيثَاقَ ٱللَّهِ ٱلَّذِي أَخَذَهُ وَوَكَّدَهُ اَلسَّلاَمُ عَلَيْكَ يَا وَعْدَ ٱللَّهِ ٱلَّذِي ضَمِنَهُ

اَلسَّلاَمُ عَلَيْكَ أَيُّهَا ٱلْعَلَمُ ٱلْمَنْصُوبُ وَٱلْعِلْمُ ٱلْمَصْبُوبُ وَٱلْغَوْثُ وَٱلرَّحْمَةُ ٱلْوَاسِعَةُ وَعْداً غَيْرَ مَكْذُوبٍ

اَلسَّلاَمُ عَلَيْكَ حِينَ تَقوُمُ اَلسَّلاَمُ عَلَيْكَ حِينَ تَقْعُدُ اَلسَّلاَمُ عَلَيْكَ حِينَ تَقْرَأُ وَتُبَيِّنُ اَلسَّلاَمُ عَلَيْكَ حِينَ تُصَلِّي وَتَقْنُتُ اَلسَّلاَمُ عَلَيْكَ حِينَ تَرْكَعُ وَتَسْجُدُ اَلسَّلاَمُ عَلَيْكَ حِينَ تُهَلِّلُ وَتُكَبِّرُ اَلسَّلاَمُ عَلَيْكَ حِينَ تَحْمَدُ وَتَسْتَغْفِرُ اَلسَّلاَمُ عَلَيْكَ حِينَ تُصْبِحُ وَتُمْسِي

اَلسَّلاَمُ عَلَيْكَ فِي ٱللَّيْلِ إِذَا يَغْشَىٰ وَٱلنَّهَارِ إِذَا تَجَلَّىٰ

اَلسَّلاَمُ عَلَيْكَ أَيُّهَا ٱلإِمَامُ ٱلْمَأْمُونُ اَلسَّلاَمُ عَلَيْكَ أَيُّهَا ٱلْمُقَدَّمُ ٱلْمَأْمُولُ اَلسَّلاَمُ عَلَيْكَ بِجَوَامِعِ ٱلسَّلاَمِ

أُشْهِدُكَ يَا مَوْلاَيَ أَنِّي أَشْهَدُ أَنْ لاَ إِلٰهَ إِلاَّ ٱللَّهُ وَحْدَهُ لاَ شَرِيكَ لَهُ وَأَنَّ مُحَمَّداً عَبْدُهُ وَرَسُولُهُ لاَ حَبِيبَ إِلاَّ هُوَ وَأَهْلُهُ

  ameenallah: {
    title: 'زيارة أمين الله',
    text: `اَلسَّلَامُ عَلَیْكَ یَا اَمِیْنَ اللّٰهِ فِیْ اَرْضِهٖ وَحُجَّتَهٗ عَلٰی عِبَادِهٖ، اَلسَّلَامُ عَلَیْكَ یَا اَمِیْرَ الْمُؤْمِنِیْنَ.

اَشْهَدُ اَنَّكَ جَاهَدْتَ فِی اللّٰهِ حَقَّ جِهَادِهٖ، وَعَمِلْتَ بِكِتَابِهٖ، وَاتَّبَعْتَ سُنَنَ نَبِیِّهٖ صَلَّی اللّٰهُ عَلَیْهِ وَآلِهٖ، حَتّٰی دَعَاكَ اللّٰهُ اِلیٰ جِوَارِهٖ، فَقَبَضَكَ اِلَیْهِ بِاخْتِیَارِهٖ، وَاَلْزَمَ اَعْدَاۤئَكَ الْحُجَّةَ، مَعَ مَا لَكَ مِنَ الْحُجَجِ الْبَالِغَةِ عَلٰی جَمِیْعِ خَلْقِهٖ.

اَللّٰهُمَّ فَاجْعَلْ نَفْسِیْ مُطْمَئِنَّةً بِقَدَرِكَ، رَاضِیَةً بِقَضَاۤئِكَ، مُوْلَعَةً بِذِكْرِكَ وَدُعَاۤئِكَ، مُحِبَّةً لِصَفْوَةِ اَوْلِیَاۤئِكَ، مَحْبُوْبَةً فِیْ اَرْضِكَ وَسَمَاۤئِكَ، صَابِرَةً عَلٰی نُزُوْلِ بَلَاۤئِكَ، شَاكِرَةً لِفَوَاضِلِ نَعْمَاۤئِكَ، ذَاكِرَةً لِسَوَابِغِ آلَاۤئِكَ، مُشْتَاقَةً اِلیٰ فَرْحَةِ لِقَاۤئِكَ، مُتَزَوِّدَةً التَّقْوٰی لِیَوْمِ جَزَاۤئِكَ، مُسْتَنَّةً بِسُنَنِ اَوْلِیَاۤئِكَ، مُفَارِقَةً لِاَخْلَاقِ اَعْدَاۤئِكَ، مَشْغُوْلَةً عَنِ الدُّنْیَا بِحَمْدِكَ وَثَنَاۤئِكَ.

اَللّٰهُمَّ اِنَّ قُلُوْبَ الْمُخْبِتِیْنَ اِلَیْكَ وَالِهَةٌ، وَسُبُلَ الرَّاغِبِیْنَ اِلَیْكَ شَارِعَةٌ، وَاَعْلَامَ الْقَاصِدِیْنَ اِلَیْكَ وَاضِحَةٌ، وَاَفْئِدَةَ الْعَارِفِیْنَ مِنْكَ فَازِعَةٌ، وَاَصْوَاتَ الدَّاعِیْنَ اِلَیْكَ صَاعِدَةٌ، وَاَبْوَابَ الْاِجَابَةِ لَهُمْ مُفَتَّحَةٌ، وَدَعْوَةَ مَنْ نَاجَاكَ مُسْتَجَابَةٌ، وَتَوْبَةَ مَنْ اَنَابَ اِلَیْكَ مَقْبُوْلَةٌ، وَعَبْرَةَ مَنْ بَكٰی مِنْ خَوْفِكَ مَرْحُوْمَةٌ، وَالْاِغَاثَةَ لِمَنِ اسْتَغَاثَ بِكَ مَوْجُوْدَةٌ، وَالْاِعَانَةَ لِمَنِ اسْتَعَانَ بِكَ مَبْذُوْلَةٌ، وَعِدَاتِكَ لِعِبَادِكَ مُنْجَزَةٌ، وَزَلَلَ مَنِ اسْتَقَالَكَ مُقَالَةٌ، وَاَعْمَالَ الْعَامِلِیْنَ لَدَیْكَ مَحْفُوْظَةٌ، وَاَرْزَاقَكَ اِلَی الْخَلَاۤئِقِ مِنْ لَدُنْكَ نَازِلَةٌ، وَعَوَاۤئِدَ الْمَزِیْدِ اِلَیْهِمْ وَاصِلَةٌ، وَذُنُوْبَ الْمُسْتَغْفِرِیْنَ مَغْفُوْرَةٌ، وَحَوَاۤئِجَ خَلْقِكَ عِنْدَكَ مَقْضِیَّةٌ، وَجَوَاۤئِزَ السَّاۤئِلِیْنَ عِنْدَكَ مُوَفَّرَةٌ، وَعَوَاۤئِدَ الْمَزِیْدِ مُتَوَاتِرَةٌ، وَمَوَاۤئِدَ الْمُسْتَطْعِمِیْنَ مُعَدَّةٌ، وَمَنَاهِلَ الظِّمَاۤئِ مُتْرَعَةٌ.

اَللّٰهُمَّ فَاسْتَجِبْ دُعَاۤئِیْ، وَاقْبَلْ ثَنَاۤئِیْ، وَاجْمَعْ بَیْنِیْ وَبَیْنَ اَوْلِیَاۤئِیْ، بِحَقِّ مُحَمَّدٍ وَعَلِیٍّ وَفَاطِمَةَ وَالْحَسَنِ وَالْحُسَیْنِ، اِنَّكَ وَلِیُّ نَعْمَاۤئِیْ، وَمُنْتَهٰی مُنَایَ، وَغَایَةُ رَجَاۤئِیْ فِیْ مُنْقَلَبِیْ وَمَثْوَایَ.

<span class="section-title">من كامل الزيارات:</span>

اَنْتَ اِلٰهِیْ وَسَیِّدِیْ وَمَوْلَایَ، اِغْفِرْ لِاَوْلِیَاۤئِنَا، وَكُفَّ عَنَّا اَعْدَاۤئَنَا، وَاشْغَلْهُمْ عَنْ اَذَانَا، وَاَظْهِرْ كَلِمَةَ الْحَقِّ وَاجْعَلْهَا الْعُلْیَا، وَاَدْحِضْ كَلِمَةَ الْبَاطِلِ وَاجْعَلْهَا السُّفْلٰی، اِنَّكَ عَلٰی كُلِّ شَیْءٍ قَدِیْرٌ.

<span class="section-title">الوداع:</span>

اَلسَّلَامُ عَلَیْكَ اَیُّهَا الْاِمَامُ وَرَحْمَةُ اللّٰهِ وَبَرَكَاتُهٗ، اَسْتَوْدِعُكَ اللّٰهَ وَعَلَیْكَ السَّلَامُ وَرَحْمَةُ اللّٰهِ وَبَرَكَاتُهٗ.

آمَنَّا بِالرَّسُوْلِ وَبِمَا جِئْتُمْ بِهٖ وَدَعَوْتُمْ اِلَیْهِ.

اَللّٰهُمَّ لَا تَجْعَلْهُ آخِرَ الْعَهْدِ مِنْ زِیَارَتِیْ وَلِیَّكَ.

اَللّٰهُمَّ لَا تَحْرِمْنِیْ ثَوَابَ مَزَارِهِ الَّذِیْ اَوْجَبْتَ لَهٗ، وَیَسِّرْ لَنَا الْعَوْدَ اِلَیْهِ اِنْ شَاۤءَ اللّٰهُ تَعَالٰی.`

    'سلام بر تو ای ابا عبدالله و بر ارواحی که در آستان تو فرود آمدند، بر تو از جانب من سلام خدا باد تا هستم و تا شب و روز باقی است، و خدا آن را آخرین زیارت من از شما قرار ندهد، سلام بر حسین و بر علی بن حسین و بر فرزندان حسین و بر یاران حسین.',
    'سپس بگو:',
    'خدایا نخستین ستمگر را از جانب من به لعنت اختصاص ده و از او آغاز کن، سپس دومی، سپس سومی، سپس چهارمی. خدایا یزید بن معاویه را پنجمین لعنت کن، و عبیدالله بن زیاد و پسر مرجانه و عمر بن سعد و شمر و خاندان ابوسفیان و خاندان زیاد و خاندان مروان را تا روز قیامت لعنت کن.',
    'سپس سجده کن و بگو:',
    'خدایا حمد تو راست، حمد سپاسگزاران تو بر مصیبتشان، سپاس خدا را بر بزرگی مصیبتم. خدایا شفاعت حسین علیه السلام را در روز ورود روزی من کن و قدم صدقی نزد خود با حسین و یاران حسین که جان خود را در راه حسین علیه السلام فدا کردند برایم استوار ساز.',
    'دعای علقمه',
    'ای خدا ای خدا ای خدا، ای اجابت‌کننده دعای درماندگان، ای برطرف‌کننده غم‌های اندوهگینان، ای فریادرس فریادخواهان، ای دادرس دادخواهان، ای کسی که از رگ گردن به من نزدیکتری، ای کسی که میان آدمی و دلش حایل می‌شوی، و ای کسی که در بالاترین دیدگاه و در افق روشن است، و ای کسی که رحمان رحیم بر عرش مستقر شده، و ای کسی که خیانت چشم‌ها و آنچه سینه‌ها پنهان می‌دارند را می‌داند، و ای کسی که هیچ پنهانی بر او پوشیده نیست، ای کسی که صداها بر او مشتبه نمی‌شود و ای کسی که حاجت‌ها او را به اشتباه نمی‌اندازد و ای کسی که اصرار اصرارکنندگان او را خسته نمی‌کند، و ای دریابنده هر از دست رفته‌ای، و ای گردآورنده هر پراکنده‌ای، و ای آفریننده جان‌ها پس از مرگ، ای کسی که هر روز در کاری است، ای برآورنده حاجت‌ها، ای برطرف‌کننده غم‌ها، ای عطاکننده خواسته‌ها، ای صاحب آرزوها، ای کفایت‌کننده مهمات، ای کسی که از هر چیز کفایت می‌کند و هیچ چیز از او کفایت نمی‌کند در آسمان‌ها و زمین.',
    'از تو می‌خواهم به حق محمد خاتم پیامبران و علی امیرالمؤمنین و به حق فاطمه دختر پیامبرت و به حق حسن و حسین، که من با آنها رو به تو می‌آورم در این جایگاه و به آنها توسل می‌جویم و به آنها شفاعت می‌خواهم نزد تو و به حقشان از تو می‌خواهم و سوگند می‌دهم و عزم می‌کنم بر تو، و به شأنی که نزد تو دارند و به مقداری که نزد تو دارند و به آنچه آنها را بر جهانیان برتری دادی و به نامت که نزد آنها قرار دادی و به آن آنها را از جهانیان اختصاص دادی و به آن آنها و فضلشان را از فضل جهانیان متمایز ساختی تا فضلشان بر فضل همه جهانیان برتری یافت.',
    'از تو می‌خواهم که بر محمد و آل محمد درود فرستی و غم و اندوه و گرفتاری‌ام را برطرف کنی و مهمات کارهایم را کفایت کنی و بدهی‌ام را بگزاری و مرا از فقر پناه دهی و از تنگدستی پناه دهی و از سؤال از مخلوقین بی‌نیازم کنی و غم هر که از غمش می‌ترسم و ستم هر که از ستمش می‌ترسم و سختی هر که از سختی‌اش می‌ترسم و ناملایمات هر که از ناملایماتش می‌ترسم و شر هر که از شرش می‌ترسم و مکر هر که از مکرش می‌ترسم و تجاوز هر که از تجاوزش می‌ترسم و سلطه هر که از سلطه‌اش می‌ترسم و نیرنگ هر که از نیرنگش می‌ترسم و قدرت هر که از قدرتش بر خودم می‌ترسم کفایت کنی و نیرنگ نیرنگ‌بازان و مکر مکاران را از من بازگردانی.',
    'خدایا هر که قصد مرا کند تو قصد او کن و هر که بر من مکر کند تو بر او مکر کن و شر و مکر و قدرت و آرزوهایش را از من برگردان و او را از من بازدار هر گونه بخواهی و هر جا بخواهی.',
    'خدایا او را از من مشغول کن به فقری که جبران نکنی و بلایی که نپوشانی و نیازی که برنیاوری و بیماری‌ای که شفا ندهی و خواری‌ای که عزت ندهی و مسکنتی که جبران نکنی.',
    'خدایا خواری را در برابر چشمانش بزن و فقر را در خانه‌اش و بیماری و درد را در بدنش داخل کن تا او را از من به مشغولیتی مشغول کنی که فراغتی در آن نباشد و یاد مرا از یادش ببر چنان‌که یاد خود را از یادش بردی و گوش و چشم و زبان و دست و پا و دل و همه اعضایش را از من بگیر و در همه آنها بیماری داخل کن و او را شفا نده تا آن را برایش مشغولیتی از من قرار دهی و مرا کفایت کن ای کفایت‌کننده‌ای که جز تو کفایت‌کننده‌ای نیست، پس تو کفایت‌کننده‌ای که جز تو کفایت‌کننده‌ای نیست و فریادرسی که جز تو فریادرسی نیست و یاری‌کننده‌ای که جز تو یاری‌کننده‌ای نیست و پناهی که جز تو پناهی نیست، زیان‌دیده است کسی که پناهش غیر تو و یاری‌کننده‌اش غیر تو و فریادرسش غیر تو و گریزگاهش به غیر تو و پناهگاهش به غیر تو و نجاتش از مخلوقی غیر تو باشد، پس تو اعتماد و امید و فریادگاه و گریزگاه و پناهگاه و نجاتگاه منی، پس به تو آغاز می‌کنم و به تو پیروزی می‌جویم و به محمد و آل محمد رو به سوی تو می‌آورم و توسل می‌جویم و شفاعت می‌خواهم.',
    'پس از تو می‌خواهم ای خدا ای خدا ای خدا، پس حمد تو راست و شکر تو راست و شکایت به سوی تو و تو یاری‌کننده‌ای.',
    'پس از تو می‌خواهم ای خدا ای خدا ای خدا، به حق محمد و آل محمد که بر محمد و آل محمد درود فرستی و غم و اندوه و گرفتاری مرا در این جایگاه برطرف کنی چنان‌که از پیامبرت غم و اندوه و گرفتاریش را برطرف کردی و هول دشمنش را کفایت کردی، پس از من برطرف کن چنان‌که از او برطرف کردی و گشایش ده چنان‌که به او گشایش دادی و کفایتم کن چنان‌که او را کفایت کردی و هول آنچه از هولش می‌ترسم و هزینه آنچه از هزینه‌اش می‌ترسم و غم آنچه از غمش می‌ترسم بدون زحمتی بر خودم از من برگردان و مرا با برآورده شدن حاجاتم و کفایت آنچه غمش مرا گرفته از کار آخرت و دنیایم بازگردان.',
    'ای امیرالمؤمنین و ای ابا عبدالله، بر شما از جانب من سلام خدا باد تا شب و روز باقی است و خدا آن را آخرین عهد من از زیارت شما قرار ندهد و خدا میان من و شما جدایی نیندازد.',
    'خدایا مرا به زندگی محمد صلی الله علیه و آله و ذریه‌اش زنده بدار و به مرگ آنها بمیران و بر ملتشان وفاتم ده و در گروهشان محشورم کن و میان من و آنها به اندازه چشم بر هم زدنی جدایی نینداز هرگز در دنیا و آخرت.'
  ],
  ahd: [
    'خدایا ای پروردگار نور بزرگ و پروردگار عرش بلند و پروردگار دریای جوشان و نازل‌کننده تورات و انجیل و زبور و پروردگار سایه و گرما و نازل‌کننده قرآن بزرگ و پروردگار فرشتگان مقرب و پیامبران و فرستادگان.',
    'خدایا از تو می‌خواهم به روی کریمت و به نور روی درخشانت و ملک قدیمت، ای زنده ای پاینده از تو می‌خواهم به نامت که آسمان‌ها و زمین‌ها به آن درخشید و به نامت که اولین و آخرین به آن صالح شوند، ای زنده پیش از هر زنده‌ای و ای زنده پس از هر زنده‌ای و ای زنده هنگامی که زنده‌ای نیست ای زنده‌کننده مردگان و میراننده زندگان ای زنده که معبودی جز تو نیست.',
    'خدایا به مولایمان امام هادی مهدی قائم به امر تو، درودهای خدا بر او و بر پدران پاکش، از جانب همه مؤمنان و مؤمنات در مشرق و مغرب زمین، دشت و کوه و خشکی و دریایش و از جانب من و والدینم، درودهایی به سنگینی عرش خدا و مداد کلماتش و آنچه علمش شمرده و کتابش احاطه کرده برسان.',
    'خدایا من در صبح این روز و هر روز عمرم عهد و پیمان و بیعتی برای او در گردنم تجدید می‌کنم که از آن نگردم و هرگز زوال نیابم. خدایا مرا از یاران و یاوران و دفاع‌کنندگان از او و شتابندگان به سوی او در برآوردن حاجاتش و فرمانبرداران اوامرش و حامیان او و پیشگامان در اراده‌اش و شهیدان در برابرش قرار ده. خدایا اگر مرگ که آن را بر بندگانت حتمی ساخته‌ای میان من و او حایل شود، پس مرا از قبرم بیرون آور در حالی که کفنم را بسته‌ام و شمشیرم را برهنه کرده‌ام و نیزه‌ام را آماده ساخته‌ام و دعوت دعوت‌کننده را در حاضر و بادیه لبیک می‌گویم.',
    'خدایا سیمای راشد و پیشانی پسندیده را به من بنما و چشمم را به نگاهی از من به او روشن کن و فرجش را نزدیک ساز و راه خروجش را آسان کن و راهش را گشاده ساز و مرا در مسیرش ببر و فرمانش را نافذ کن و پشتش را محکم ساز و خدایا شهرهایت را به او آباد کن و بندگانت را به او زنده کن که تو گفتی و گفته‌ات حق است: فساد در خشکی و دریا به سبب آنچه دست‌های مردم کسب کرده ظاهر شد، پس خدایا ولی‌ات و فرزند دختر پیامبرت را که هم‌نام رسولت است برای ما آشکار ساز تا چیزی از باطل پیروز نشود مگر آن‌که آن را پاره کند و حق را محقق سازد و خدایا او را پناهگاه ستم‌دیدگان بندگانت و یاری‌کننده کسی که یاری‌کننده‌ای جز تو ندارد و تجدیدکننده آنچه از احکام کتابت تعطیل شده و استوارکننده نشانه‌های دینت و سنت‌های پیامبرت محمد صلی الله علیه و آله و سلم قرار ده، و خدایا او را از کسانی قرار ده که از آسیب متجاوزان حفظش کرده‌ای.',
    'خدایا پیامبرت محمد صلی الله علیه و آله و سلم را به دیدن او و هر که در دعوتش از او پیروی کرده شاد کن و بر ذلت ما پس از او رحم کن. خدایا این اندوه را از این امت با حضور او برطرف کن و ظهورش را برای ما تعجیل فرما که آنها آن را دور می‌بینند و ما آن را نزدیک می‌بینیم، به رحمتت ای مهربان‌ترین مهربانان.',
    'سپس سه بار بر ران راستت با دستت بزن و بگو:',
    'زود باش زود باش ای مولای من ای صاحب الزمان.'
  ],
  kisa: [
    'خدایا بر محمد و آل محمد درود فرست',
    'به نام خداوند بخشنده مهربان',
    'از فاطمه زهرا سلام الله علیها دختر رسول خدا صلی الله علیه و آله روایت شده که فرمود: پدرم رسول خدا صلی الله علیه و آله روزی بر من وارد شد و فرمود: سلام بر تو ای فاطمه. گفتم: بر تو سلام. فرمود: در بدنم ضعفی احساس می‌کنم. گفتم: تو را به خدا پناه می‌دهم ای پدر از ضعف. فرمود: ای فاطمه کسای یمانی را بیاور و مرا با آن بپوشان. پس کسای یمانی را آوردم و او را با آن پوشاندم و به او نگاه می‌کردم و ناگاه صورتش چون ماه شب چهارده در کمال و تمامش می‌درخشید. ساعتی نگذشته بود که فرزندم حسن علیه السلام آمد و گفت: سلام بر تو ای مادر. گفتم: و بر تو سلام ای نور چشم و میوه دلم. گفت: ای مادر بوی خوشی نزد تو می‌شنوم گویا بوی جدم رسول خدا صلی الله علیه و آله است. گفتم: آری جدت زیر کساست. پس حسن به سوی کسا رفت و گفت: سلام بر تو ای جدم ای رسول خدا آیا اجازه می‌دهی با تو زیر کسا بیایم؟ فرمود: و بر تو سلام ای فرزندم و ای صاحب حوض من، اجازه دادم. پس با او زیر کسا رفت.',
    'ساعتی نگذشته بود که فرزندم حسین آمد و گفت: سلام بر تو ای مادر. گفتم: و بر تو سلام ای فرزندم و ای نور چشم و میوه دلم. گفت: ای مادر بوی خوشی نزد تو می‌شنوم گویا بوی جدم رسول خدا صلی الله علیه و آله است. گفتم: آری جدت و برادرت زیر کسا هستند. پس حسین به سوی کسا رفت و گفت: سلام بر تو ای جدم سلام بر تو ای برگزیده خدا آیا اجازه می‌دهی با شما زیر کسا باشم؟ فرمود: و بر تو سلام ای فرزندم و ای شفاعت‌کننده امتم، اجازه دادم. پس با آنها زیر کسا رفت.',
    'پس در آن هنگام ابوالحسن علی بن ابی‌طالب آمد و گفت: سلام بر تو ای دختر رسول خدا. گفتم: و بر تو سلام ای ابوالحسن و ای امیرالمؤمنین. گفت: ای فاطمه بوی خوشی نزد تو می‌شنوم گویا بوی برادر و پسرعمویم رسول خدا صلی الله علیه و آله است. گفتم: آری او با دو فرزندت زیر کساست. پس علی به سوی کسا رفت و گفت: سلام بر تو ای رسول خدا آیا اجازه می‌دهی با شما زیر کسا باشم؟ فرمود: و بر تو سلام ای برادرم و ای وصی و جانشین و صاحب پرچمم، اجازه دادم. پس علی زیر کسا رفت.',
    'سپس من به سوی کسا رفتم و گفتم: سلام بر تو ای پدر ای رسول خدا آیا اجازه می‌دهی با شما زیر کسا باشم؟ فرمود: و بر تو سلام ای دخترم و ای پاره تنم، اجازه دادم. پس زیر کسا رفتم.',
    'پس چون همگی زیر کسا جمع شدیم پدرم رسول خدا دو طرف کسا را گرفت و با دست راستش به سوی آسمان اشاره کرد و گفت: خدایا اینان اهل بیت و خاصگان و نزدیکان من‌اند، گوشتشان گوشت من و خونشان خون من است، آنچه آنها را بیازارد مرا می‌آزارد و آنچه آنها را اندوهگین کند مرا اندوهگین می‌کند، من در جنگم با هر که با آنها بجنگد و در آشتی‌ام با هر که با آنها آشتی کند و دشمنم با هر که با آنها دشمنی کند و دوستم با هر که آنها را دوست بدارد، آنها از من‌اند و من از آنها، پس درود و برکات و رحمت و آمرزش و خشنودیت را بر من و آنها قرار ده و پلیدی را از آنها ببر و پاکشان گردان پاک گردانیدنی.',

// ===== STATE =====
let currentDua = null;
let fontSize = parseFloat(localStorage.getItem('dua-fontsize') || '1.5');
let showFarsi = localStorage.getItem('dua-showfarsi') === 'true';

// ===== NAVIGATION =====
function openDua(key) {
  currentDua = key;
  const dua = duas[key];
  const trans = translations[key] || [];
  document.getElementById('readerTitle').textContent = dua.title;

  // Split text into paragraphs and add translations
  const paragraphs = dua.text.split('\n\n');
  let html = '';
  let tIdx = 0;
  for (let i = 0; i < paragraphs.length; i++) {
    const p = paragraphs[i].trim();
    if (!p) continue;
    // Check if this is a special span (section-title, repeat-note, instruction)
    const isSpecial = p.startsWith('<span');
    if (isSpecial) {
      html += p;
      if (tIdx < trans.length) {
        html += '<span class="farsi">' + trans[tIdx] + '</span>';
        tIdx++;
      }
    } else {
      html += '<p style="margin:0 0 8px 0">' + p + '</p>';
      if (tIdx < trans.length) {
        html += '<span class="farsi">' + trans[tIdx] + '</span>';
        tIdx++;
      }
    }
  }

  document.getElementById('duaText').innerHTML = html;
  document.getElementById('duaText').style.fontSize = fontSize + 'em';
  document.getElementById('menuPage').style.display = 'none';
  document.getElementById('readerPage').style.display = 'flex';
  document.getElementById('progressBar').style.width = '0%';

  // Init audio player
  initAudio(key);

  // Apply translation state
  const btn = document.getElementById('translateBtn');
  if (showFarsi) {
    document.getElementById('duaText').classList.add('show-farsi');
    btn.classList.add('active');
  } else {
    document.getElementById('duaText').classList.remove('show-farsi');
    btn.classList.remove('active');
  }

  // Restore scroll position
  const saved = localStorage.getItem('scroll-' + key);
  const body = document.getElementById('readerBody');
  if (saved) {
    requestAnimationFrame(() => body.scrollTop = parseInt(saved));
  } else {
    body.scrollTop = 0;
  }
}

// ===== TRANSLATION TOGGLE =====
function toggleTranslation() {
  showFarsi = !showFarsi;
  localStorage.setItem('dua-showfarsi', showFarsi);
  const btn = document.getElementById('translateBtn');
  if (showFarsi) {
    document.getElementById('duaText').classList.add('show-farsi');
    btn.classList.add('active');
  } else {
    document.getElementById('duaText').classList.remove('show-farsi');
    btn.classList.remove('active');
  }
}

// ===== AUDIO PLAYER =====
const audioFiles = {
  ashura: 'audio/ashura.mp3',
  ameenallah: 'audio/ameenallah.mp3',
  kisa: 'audio/kisa.mp3',
  aleyasin: 'audio/aleyasin.mp3',
  isteghasa: 'audio/isteghasa.mp3',
  ahd: 'audio/ahd.mp3'
};
let audio = null;
let isPlaying = false;
const SPEEDS = [1, 1.25, 1.5, 1.75];
let playbackSpeed = parseFloat(localStorage.getItem('dua-speed') || '1');
if (!SPEEDS.includes(playbackSpeed)) playbackSpeed = 1;

function initAudio(key) {
  const player = document.getElementById('audioPlayer');
  if (!audioFiles[key]) {
    player.classList.remove('visible');
    return;
  }
  if (audio) { audio.pause(); audio.src = ''; }
  audio = new Audio(audioFiles[key]);
  audio.playbackRate = playbackSpeed;
  isPlaying = false;
  document.getElementById('playBtn').innerHTML = '&#9654;';
  document.getElementById('audioProgressFill').style.width = '0%';
  document.getElementById('audioCurrentTime').textContent = '0:00';
  document.getElementById('audioDuration').textContent = '0:00';
  updateSpeedLabel();
  player.classList.add('visible');

  audio.addEventListener('loadedmetadata', () => {
    document.getElementById('audioDuration').textContent = formatTime(audio.duration);
  });
  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('audioProgressFill').style.width = pct + '%';
    document.getElementById('audioCurrentTime').textContent = formatTime(audio.currentTime);
  });
  audio.addEventListener('ended', () => {
    isPlaying = false;
    document.getElementById('playBtn').innerHTML = '&#9654;';
  });
}

function toggleAudio() {
  if (!audio) return;
  if (isPlaying) {
    audio.pause();
    document.getElementById('playBtn').innerHTML = '&#9654;';
  } else {
    audio.play();
    document.getElementById('playBtn').innerHTML = '&#10074;&#10074;';
  }
  isPlaying = !isPlaying;
}

function seekAudio(e) {
  if (!audio || !audio.duration) return;
  const bar = document.getElementById('audioProgressBar');
  const rect = bar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
}

function cycleSpeed() {
  const i = SPEEDS.indexOf(playbackSpeed);
  playbackSpeed = SPEEDS[(i + 1) % SPEEDS.length];
  localStorage.setItem('dua-speed', playbackSpeed);
  if (audio) audio.playbackRate = playbackSpeed;
  updateSpeedLabel();
}

function updateSpeedLabel() {
  const btn = document.getElementById('speedBtn');
  if (btn) btn.textContent = playbackSpeed + 'x';
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function goBack() {
  // Save scroll position
  if (currentDua) {
    const body = document.getElementById('readerBody');
    localStorage.setItem('scroll-' + currentDua, body.scrollTop);
  }
  // Stop audio
  if (audio) { audio.pause(); isPlaying = false; }
  document.getElementById('audioPlayer').classList.remove('visible');
  document.getElementById('menuPage').style.display = 'flex';
  document.getElementById('readerPage').style.display = 'none';
  document.getElementById('progressBar').style.width = '0%';
  currentDua = null;
}

// ===== FONT SIZE =====
function changeFontSize(delta) {
  fontSize = Math.max(0.8, Math.min(3.5, fontSize + delta * 0.1));
  document.getElementById('duaText').style.fontSize = fontSize + 'em';
  localStorage.setItem('dua-fontsize', fontSize);
}

// ===== SCROLL PROGRESS =====
document.getElementById('readerBody').addEventListener('scroll', function() {
  const el = this;
  const pct = (el.scrollTop / (el.scrollHeight - el.clientHeight)) * 100;
  document.getElementById('progressBar').style.width = Math.min(100, pct) + '%';
});

// ===== BACK BUTTON (browser) =====
window.addEventListener('popstate', () => {
  if (currentDua) { goBack(); }
});
function openDuaNav(key) {
  history.pushState({ dua: key }, '');
  openDua(key);
}
// Override onclick to use history
document.querySelectorAll('.menu-card').forEach(card => {
  const onclick = card.getAttribute('onclick');
  const match = onclick.match(/openDua\('(\w+)'\)/);
  if (match) {
    card.setAttribute('onclick', `openDuaNav('${match[1]}')`);
  }
});

// ===== SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
